run:
  name: "debug"
  output_dir: "outputs/"
  random_seed: 42

data:
  baseline_manifest: "/home/sohyun0423/project/reward-model-bias/data/baselines/diffusiondb/2m_random_1k/train/topic_0/black-forest-labs/FLUX.1-dev/manifest.json"
  baseline_root: "/home/sohyun0423/project/reward-model-bias"
  prompts_dir: "/home/sohyun0423/project/reward-model-bias/user_prompts/diffusiondb/2m_random_1k/train"
  topic_ids: [0]
  val_split_size: 40

models:
  reward_model:
    name: "imagereward"
    device: "cuda:0"
    hf_cache_dir: "/nfs/data/sohyun/models"

  editor:
    instruction_model: "openai/gpt-4o-mini"
    flux_model: "black-forest-labs/FLUX.1-Kontext-dev"
    flux_devices: ["cuda:0"]
    guidance_scale: 2.5

  judge:
    model: "openai/gpt-4o-mini"
    max_tokens: 1024
    max_parallel: 4

  detector:
    model: "openai/gpt-4o-mini"
    max_tokens: 1024
    max_parallel: 32

  planner:
    model: "openai/gpt-4o-mini"  # gpt-5 대신 저렴한 모델
    # model: "openai/gpt-5"  # gpt-5 대신 저렴한 모델
    reasoning: "high"               # reasoning 비활성화
    max_tokens: 10000
    max_parallel: 4

  cluster:
    model: "openai/gpt-4o-mini"  # gpt-5.2 대신 저렴한 모델
    max_tokens: 2048
    reasoning: "high"
    max_parallel: 1

evolution:
  n_steps: 2                      # 5 → 2
  initial_pop_size: 2             # 8 → 2
  target_pop_sizes: [2, 2]        # n_steps에 맞춤
  n_mutations: 1
  n_context_imgs: 4               # 16 → 4
  n_attrs_per_prompt: 2           # 4 → 2
  n_per_user_prompt: 1
  n_initial_plan_prompts: 3             # 전체 train 프롬프트 중 3개만 사용
  initial_context_sampling: "stratified"
  use_cluster_summary: false
  direction: "plus"
  image_order: "descending"   # planner에게 이미지 보여주는 순서 (reward 높은 순)
  context: "vanilla"              # ancestry → vanilla (이미지 로딩 최소화)
  mutation_context_source: "accumulated"  # "origin" | "accumulated" | "latest"
  cosine_sim_threshold_initial: 0.9
  cosine_sim_threshold_evolution: 0.9
  replan_if_no_undesirable: true
  strict_undesirable_selection: true

evaluation:
  train_batch_size: [2, 2]        # 32 → 2 (프롬프트 2개만)
  n_rollouts_per_prompt: 1
  judge_first_n_rollouts: 1
  amp_n_prompts: 2                # 32 → 2
  amp_n_images_per_prompt: 4      # 64 → 4
  use_outlier_removal: false

logging:
  wandb:
    enabled: false                # W&B 비활성화
  log_images_every_n_steps: 1
  console_level: "DEBUG"
