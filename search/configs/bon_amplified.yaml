run:
  name: null             # auto-generated
  output_dir: "outputs/search"
  random_seed: 42

pipeline:
  mode: "bon_amplified"

bon_amplified:
  N: 2                       # BoN parameter for U^{N-1} quantile
  tau: 0.0                    # A_hat pruning threshold (keep attrs with A_hat > tau)
  n_top_residual: 4           # P+/P- images extracted per prompt
  n_prompts_vlm: 8            # prompts shown to VLM per mining call
  n_proposals: 10             # attr proposals requested per VLM mining call
  n_proposer_calls: 2         # proposer VLM calls per EXPAND step (total = n_proposals × n_proposer_calls)
  proposer_use_cluster_summary: true  # include cluster summary in proposer prompt
  use_per_prompt_ols: true   # fit separate OLS W_x per prompt (residuals = per-prompt unexplained)
  # Monotonic pool + partial_A_hat admission
  use_monotonic_pool: true   # admit via partial_A_hat (> tau_partial, Top-K'); skip top-K cap
  tau_partial: 0.0           # partial_A_hat threshold
  n_admit_per_step: 4        # max admissions per EXPAND (Top-K')
  # Proposer prompt selection
  prompt_select_strategy: "middle_band"   # "random" | "middle_band"
  prompt_select_exclude_pct: 0.2          # top/bottom % trim for middle_band
  select_all_passing: false   # false → top-K selection (K = target_pop_sizes[step_idx])
  # Prevalence filter: reject attrs with global p1 outside [p1_min, p1_max].
  # Removes attrs that are too rare or too ubiquitous to discriminate BoN signal.
  use_p1_filter: true
  p1_min: 0.1
  p1_max: 0.9
  # detection_cache_path: outputs/detection_cache/diffusiondb/2m_random_1k/train/black-forest-labs/FLUX.1-dev.json
  detection_cache_path: outputs/detection_cache/mjhq/black-forest-labs-FLUX.1-dev.json


data:
  # baseline_manifest: "/home/sohyun0423/project/reward-model-bias/data/baselines/diffusiondb/2m_random_1k/train/topic_0/black-forest-labs/FLUX.1-dev/manifest.json"
  # baseline_root: "/home/sohyun0423/project/reward-model-bias"
  # prompts_dir: "/home/sohyun0423/project/reward-model-bias/user_prompts/diffusiondb/2m_random_1k/train"
  baseline_manifest: "/nfs/data/sohyun/projects/t2i-rm-bias/data/baselines/mjhq/topic_0/black-forest-labs-FLUX.1-dev/manifest.json"
  baseline_root: ""
  prompts_dir: "clustering/output/mjhq"
  topic_ids: [0]
  val_split_size: 40

models:
  reward_model:
    name: "imagereward"  # "imagereward" | "pickscore" | "hpsv3"
    device: "cuda:0"
    hf_cache_dir: "/nfs/data/sohyun/models"

  detector:
    # model: "openai/gpt-4o-mini"
    model: "Qwen/Qwen3.5-9B"
    max_tokens: 1024
    max_parallel: 32
    image_detail: "auto"
    use_batch_api: false
    vllm_base_url: http://localhost:8000/v1
    temperature: 0.7
    top_p: 0.8
    presence_penalty: 1.5
    extra_body:
      top_k: 20
      chat_template_kwargs:
        enable_thinking: false
    use_prompt: false      # include image generation prompt in detection query
    use_reasoning: false   # request reasoning field in JSON response (false = faster)

  planner:
    model: "openai/gpt-5.2"
    reasoning: "high"
    max_tokens: 50000
    max_parallel: 64

  attr_filter:
    # AttributeUndesirabilityFilter: simple YES/NO humanness check
    model: "openai/gpt-5.2"
    max_tokens: 128
    max_parallel: 64

  proposer:
    # BonResidualProposer: VLM attr mining shown P+/P- images
    model: "openai/gpt-5.2"
    reasoning: "high"
    max_tokens: 50000
    max_parallel: 64
    image_detail: "auto"

  cluster:
    model: "openai/gpt-5.2"
    max_tokens: 10000
    reasoning: "high"
    max_parallel: 1

  # editor and judge are unused in bon_amplified mode; kept for SearchConfig defaults
  editor:
    instruction_model: "openai/gpt-4o-mini"
    flux_model: "black-forest-labs/FLUX.1-Kontext-dev"
    flux_devices: ["cuda:0"]
    guidance_scale: 2.5
  judge:
    model: "openai/gpt-4o-mini"
    max_tokens: 10000
    max_parallel: 32
    image_detail: "low"  # required by validate()
    use_batch_api: false

evolution:
  n_steps: 10
  initial_pop_size: 8           # clustering cap = initial_pop_size × 2
  # target_pop_sizes: [4, 4, 4, 4, 4, 4, 4, 4, 4, 4]   # K for top-K selection per step
  target_pop_sizes: [8, 8, 8, 8, 8, 8, 8, 8, 8, 8]   # K for top-K selection per step
  n_context_imgs: 8            # images shown to InitialPlanner per prompt
  n_attrs_per_prompt: 8         # attrs requested per InitialPlanner call
  n_per_user_prompt: 1          # InitialPlanner calls per train prompt (single-prompt mode only)
  n_initial_plan_prompts: 32    # train prompts sampled for InitialPlanner
  n_prompts_per_plan_call: 4    # >1: show multiple prompts per VLM call (cross-prompt mode)
  initial_context_sampling: "stratified"
  use_cluster_summary: true
  direction: "plus"
  image_order: "descending"

evaluation:
  train_batch_size: [32, 32, 32, 32, 32, 32, 32, 32, 32, 32]   # required by validate()
  amp_n_prompts: 32             # prompts sampled for fixed baseline set
  amp_n_images_per_prompt: 128  # images per prompt in fixed baseline set

# baseline_pairs section is unused by bon_amplified; required by SearchConfig.validate()
baseline_pairs:
  pair_constructor: stratified   # required by validate()
  judge_filter_position: "lazy"  # required by validate()
  regression_model: ridge        # required by validate()

caller_cache:
  enabled: false          # false = disable caching entirely (saves disk space)
  base_path: ".cache/caller"
  max_entries_in_disk: 131072   # null = no size limit

logging:
  wandb:
    enabled: true
    project: "t2i-rm-bias-bon-amplified"
    entity: null
    tags: ["search", "bon-amplified"]
  log_images_every_n_steps: 1
  console_level: "INFO"
