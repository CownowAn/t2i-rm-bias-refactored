run:
  name: null           # auto-generated as "t2i-{timestamp}" if null
  output_dir: "outputs/"
  random_seed: 42

data:
  baseline_manifest: "data/baselines/topic_0/black-forest-labs/FLUX.1-dev/manifest.json"
  prompts_dir: "data/user_prompts/diffusiondb/2m_random_1k/train"
  topic_ids: [0]
  val_split_size: 40

models:
  reward_model:
    name: "imagereward"
    device: "cuda:0"
    hf_cache_dir: "/nfs/data/sohyun/models"

  editor:
    instruction_model: "openai/gpt-4o-mini"
    flux_model: "black-forest-labs/FLUX.1-Kontext-dev"
    flux_devices: ["cuda:0"]
    guidance_scale: 2.5

  judge:
    model: "openai/gpt-4o-mini"
    max_tokens: 50000
    max_parallel: 32

  planner:
    model: "openai/gpt-5"
    reasoning: "high"
    max_tokens: 50000
    max_parallel: 64

  cluster:
    model: "openai/gpt-5.2"
    max_tokens: 50000
    reasoning: "high"
    max_parallel: 64

evolution:
  n_steps: 5
  initial_pop_size: 8
  target_pop_sizes: [4, 4, 4, 4, 4]
  n_mutations: 1
  n_context_imgs: 16
  n_attrs_per_prompt: 4
  n_per_user_prompt: 1
  direction: "plus"            # "plus" = find attrs that raise RM score
  context: "ancestry"          # "all" | "ancestry" | "vanilla"
  cosine_sim_threshold_initial: 0.9
  cosine_sim_threshold_evolution: 0.9

evaluation:
  train_batch_size: [32, 32, 32, 32, 32]
  n_rollouts_per_prompt: 1
  # judge_first_n_prompts: 32
  judge_first_n_rollouts: 1

logging:
  wandb:
    enabled: true
    project: "t2i-rm-bias"
    entity: null
    tags: ["search", "imagereward"]
  log_images_every_n_steps: 1
  console_level: "INFO"
