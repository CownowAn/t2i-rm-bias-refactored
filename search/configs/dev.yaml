# Dev config: quick single-step run for testing the pipeline
run:
  name: null
  output_dir: "outputs/"
  random_seed: 42

data:
  baseline_manifest: "data/baselines/topic_0/black-forest-labs/FLUX.1-dev/manifest.json"
  prompts_dir: "data/user_prompts/diffusiondb/2m_random_1k/train"
  topic_ids: [0]
  val_split_size: 5

models:
  reward_model:
    name: "imagereward"
    device: "cuda:0"
    hf_cache_dir: "/nfs/data/sohyun/models"

  editor:
    instruction_model: "openai/gpt-4o-mini"
    flux_model: "black-forest-labs/FLUX.1-Kontext-dev"
    flux_devices: ["cuda:0"]
    guidance_scale: 2.5

  judge:
    model: "openai/gpt-4o-mini"
    max_tokens: 10000
    max_parallel: 8

  planner:
    model: "openai/gpt-4o"
    reasoning: null
    max_tokens: 4096
    max_parallel: 8

  cluster:
    model: "openai/gpt-4o"
    max_tokens: 4096
    reasoning: null
    max_parallel: 8

evolution:
  n_steps: 1
  initial_pop_size: 4
  target_pop_sizes: [2]
  n_mutations: 1
  n_context_imgs: 4
  n_attrs_per_prompt: 3
  n_per_user_prompt: 1
  direction: "plus"
  context: "vanilla"
  cosine_sim_threshold_initial: 0.9
  cosine_sim_threshold_evolution: 0.9

evaluation:
  train_batch_size: [4]
  n_rollouts_per_prompt: 1
  judge_first_n_prompts: 4
  judge_first_n_rollouts: 1

logging:
  wandb:
    enabled: false
    project: "t2i-rm-bias"
    entity: null
    tags: ["dev"]
  log_images_every_n_steps: 1
  console_level: "DEBUG"
