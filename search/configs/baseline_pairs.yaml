run:
  name: null             # auto-generated
  output_dir: "outputs/search"
  random_seed: 42

pipeline:
  mode: "baseline_pairs"

baseline_pairs:
  n_pairs_per_prompt: 16       # used when pair_constructor="hamming"
  use_judge: true
  judge_filter_position: "before_residual_select"
  n_high_residual_pairs: 32
  n_proposed_per_step: 8
  reg_fit_intercept: true    # must be true for stratified constructor (prompt-level RM baselines differ)
  pair_constructor: stratified  # "hamming" | "stratified"
  n_pairs_per_stratum: 16       # top-n pairs per (attr_k, prompt) stratum
  use_mu_filter: false           # keep only attrs where μ1 > μ0 (global mean)
  use_amp_filter: true         # keep only attrs where A(g) > 0 (prompt-averaged)
  detection_cache_path: outputs/detection_cache/diffusiondb/2m_random_1k/train/black-forest-labs/FLUX.1-dev.json    # path to JSON for cross-run detection reuse; null = disabled
                                # e.g. "outputs/detection_cache/topic0.json"
  # Regression model: "lasso" | "ridge" | "elasticnet"
  regression_model: ridge
  elasticnet_l1_ratio: [0.1, 0.5, 0.9, 1.0]  # ElasticNet only; ignored for lasso/ridge
  elasticnet_n_alphas: 100                     # alpha candidates (lasso/elasticnet) or logspace count (ridge)
  elasticnet_cv: 5

data:
  baseline_manifest: "/home/sohyun0423/project/reward-model-bias/data/baselines/diffusiondb/2m_random_1k/train/topic_0/black-forest-labs/FLUX.1-dev/manifest.json"
  baseline_root: "/home/sohyun0423/project/reward-model-bias"
  prompts_dir: "/home/sohyun0423/project/reward-model-bias/user_prompts/diffusiondb/2m_random_1k/train"
  topic_ids: [0]
  val_split_size: 40

models:
  reward_model:
    name: "imagereward"
    device: "cuda:0"
    hf_cache_dir: "/nfs/data/sohyun/models"

  editor:
    instruction_model: "openai/gpt-4o-mini"
    flux_model: "black-forest-labs/FLUX.1-Kontext-dev"
    flux_devices: ["cuda:0"]
    guidance_scale: 2.5

  judge:
    model: "openai/gpt-4o-mini"
    max_tokens: 10000
    max_parallel: 32
    image_detail: "auto"   # "auto" | "high" | "low"
    use_batch_api: false   # true → OpenAI Batch API (50% discount, blocks until complete)

  detector:
    model: "openai/gpt-4o-mini"
    max_tokens: 512
    max_parallel: 32
    image_detail: "auto"   # "auto" | "high" | "low"
    use_batch_api: false   # true → OpenAI Batch API (50% discount, blocks until complete)

  planner:
    model: "openai/gpt-5.2"
    reasoning: "high"
    max_tokens: 50000
    max_parallel: 64

  cluster:
    model: "openai/gpt-5.2"
    max_tokens: 10000
    reasoning: "high"
    max_parallel: 1

evolution:
  n_steps: 5
  initial_pop_size: 8          # humanness filter keeps up to 16 (×2)
  target_pop_sizes: [4, 4, 4, 4, 4]   # unused in bp mode but required by validation
  n_mutations: 1
  n_context_imgs: 16
  n_attrs_per_prompt: 4
  n_per_user_prompt: 1
  n_initial_plan_prompts: 32
  initial_context_sampling: "stratified"
  use_cluster_summary: false
  direction: "plus"
  image_order: "descending"
  context: "vanilla"
  mutation_context_source: "latest"
  reg_min_pairs: 5
  cosine_sim_threshold_initial: 0.9
  cosine_sim_threshold_evolution: 0.9
  replan_if_no_undesirable: false
  strict_undesirable_selection: false

evaluation:
  train_batch_size: [32, 32, 32, 32, 32]
  n_rollouts_per_prompt: 1
  judge_first_n_rollouts: 1
  amp_n_prompts: 32
  amp_n_images_per_prompt: 128
  use_outlier_removal: false

logging:
  wandb:
    enabled: true
    project: "t2i-rm-bias-baseline-pairs"
    entity: null
    tags: ["search", "baseline-pairs", "imagereward"]
  log_images_every_n_steps: 1
  console_level: "INFO"
