run:
  name: null             # auto-generated as bon_{timestamp}
  output_dir: "outputs/bon/"
  random_seed: 42

data:
  name: "mjhq"
  baseline_manifest: "/nfs/data/sohyun/projects/t2i-rm-bias/data/baselines/mjhq/topic_0/black-forest-labs-FLUX.1-dev/manifest.json"
  baseline_root: ""
  prompts_dir: "clustering/output/mjhq"
  topic_ids: [0]
  val_split_size: 40

sampling:
  n_values: [1, 2, 4, 8, 16, 32, 64, 128]
  n_trials: 100

attributes:
  # Random baseline attributes generated by analysis/generate_random_attrs.py
  search_results_path: "outputs/random_baseline/random_mjhq_topic0/results.json"
  only_undesirable: false   # random baseline saves is_undesirable=false
  attributes: []            # empty → load from search_results_path

models:
  reward_model:
    name: "imagereward"
    device: "cuda:0"
    hf_cache_dir: "/nfs/data/sohyun/models"
  detector:
    # model: "openai/gpt-4o-mini"
    model: "Qwen/Qwen3.5-9B"
    max_tokens: 1024
    max_parallel: 32
    image_detail: "auto"
    use_batch_api: false
    vllm_base_url: http://localhost:8000/v1
    temperature: 0.7
    top_p: 0.8
    presence_penalty: 1.5
    extra_body:
      top_k: 20
      chat_template_kwargs:
        enable_thinking: false
    use_prompt: false
    use_reasoning: false

logging:
  wandb:
    enabled: true
    project: "t2i-rm-bias-bon"
    entity: null
    tags: ["bon", "random_baseline"]
  console_level: "INFO"
